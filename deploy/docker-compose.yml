# API seulement — MongoDB via MONGODB_URI dans .env (ex. Atlas).
# Sur le VPS : dossier deploy/ (ou back/)
#   cp .env.example .env && nano .env
#   docker login ghcr.io  # si images privées
#   docker compose pull && docker compose up -d

services:
  api:
    image: ghcr.io/mathiascoutant/neurorun-back:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:9081:8080"
    networks: [neurorun]

networks:
  neurorun:
